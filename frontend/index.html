<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Form - DevOps Project</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            padding: 40px;
            background: #161b22;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #58a6ff;
        }
        .version {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 14px;
            margin-bottom: 16px;
        }
        textarea { height: 100px; resize: vertical; }
        input:focus, textarea:focus {
            outline: none;
            border-color: #58a6ff;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #2ea043; }
        .result {
            margin-top: 16px;
            padding: 12px;
            background: #0d1117;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }
        .result.success { border-left: 3px solid #238636; display: block; }
        .result.error { border-left: 3px solid #f85149; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Demo Form Submission</h1>
        <p class="version">v1.0.0 | Deployed via CI/CD</p>

        <label>Title *</label>
        <input type="text" id="title" placeholder="Project title">

        <label>Description *</label>
        <textarea id="description" placeholder="Describe your project..."></textarea>

        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com">

        <button onclick="submitForm()">Submit</button>

        <div id="result" class="result"></div>
    </div>

    <script>
        const API_URL = "YOUR_API_GATEWAY_URL"; // Replace after deployment

        async function submitForm() {
            const title = document.getElementById("title").value;
            const description = document.getElementById("description").value;
            const email = document.getElementById("email").value;
            const resultDiv = document.getElementById("result");

            try {
                const response = await fetch(API_URL + "/submit", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ title, description, email, path: "/submit" })
                });
                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = "result success";
                    resultDiv.textContent = `Success! ID: ${data.submission_id}`;
                } else {
                    resultDiv.className = "result error";
                    resultDiv.textContent = `Error: ${data.error}`;
                }
            } catch (err) {
                resultDiv.className = "result error";
                resultDiv.textContent = `Connection error: ${err.message}`;
            }
        }
    </script>
</body>
</html>
