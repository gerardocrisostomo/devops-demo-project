# =============================================================================
# CI PIPELINE — Runs on every push and pull request
# =============================================================================
# This workflow validates code quality and runs tests.
# If any step fails, the push is "blocked" (shows red X in GitHub).
# =============================================================================

name: CI Pipeline

# TRIGGERS: When does this pipeline run?
on:
  push:
    branches: [main, develop]     # Runs on push to main or develop
  pull_request:
    branches: [main]              # Runs on PRs targeting main

jobs:
  # ===========================================================================
  # JOB 1: Lint and validate code quality
  # ===========================================================================
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest        # Runs on a fresh Ubuntu machine

    steps:
      # Step 1: Download the code from the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install linting tools
      - name: Install dependencies
        run: pip install flake8

      # Step 4: Run linter (checks code style and errors)
      - name: Run flake8 linter
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --exit-zero --max-line-length=120 --statistics

  # ===========================================================================
  # JOB 2: Run unit tests
  # ===========================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint                   # Only runs if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      # Run tests from the project root so imports work
      - name: Run tests
        run: python -m pytest backend/tests/ -v --tb=short

  # ===========================================================================
  # JOB 3: Package the Lambda (build artifact)
  # ===========================================================================
  package:
    name: Package Lambda
    runs-on: ubuntu-latest
    needs: test                   # Only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Create a zip file with the Lambda code
      - name: Package Lambda function
        run: |
          cd backend
          zip -r ../lambda-package.zip lambda_function.py
          cd ..
          echo "Package size: $(du -h lambda-package.zip | cut -f1)"

      # Upload the artifact so the deploy job can use it
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: lambda-package.zip
          retention-days: 5
